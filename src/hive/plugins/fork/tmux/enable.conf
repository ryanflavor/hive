bind % if-shell -F '#{m:droid,#{pane_current_command}}' 'run-shell -b "hive fork --pane #{pane_id} -s h"' 'split-window -h -c "#{pane_current_path}"'
bind '"' if-shell -F '#{m:droid,#{pane_current_command}}' 'run-shell -b "hive fork --pane #{pane_id} -s v"' 'split-window -v -c "#{pane_current_path}"'
